services:
  - type: web
    name: apni-dukan-api
    env: node
    buildCommand: npm install
    startCommand: npm run start:backend
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ✅ Changed from generateValue — a new secret every restart logs everyone out
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://natani-shop.vercel.app   # ← replace with your real URL
      # ✅ New — required for web-push to work in production
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:you@example.com